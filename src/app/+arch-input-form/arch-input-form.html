<app-standard-page>
    <h2>Arch-shaped parliament diagram generator</h2>

    <!-- presentation and explanations -->

    <!-- (later) query party list from a Commons diagram -->

    <!-- (later) query party list from a country in a list -->

    <!-- (later) advanced parameters -->

    <div id="partylistarea">
        <button matButton="tonal" (click)="addParty()">+ Add a party manually</button>

        <div id="partylist">
            @for (party of diagramForm.parties; track $index) {
                <mat-card class="partycard"><mat-card-content>
                    <mat-form-field>
                        <mat-label>Party name</mat-label>
                        <input matInput [formField]="party.name" />
                    </mat-form-field>

                    <mat-form-field>
                        <mat-label>Seats</mat-label>
                        <input matInput type="number" [formField]="party.nSeats" />
                    </mat-form-field>

                    <!-- TODO add color picker -->
                    {{party.color().value()}}

                    <mat-form-field>
                        <mat-label>Border width</mat-label>
                        <input matInput type="number" step=".01" [formField]="party.borderWidth" />
                    </mat-form-field>

                    <!-- TODO add color picker -->
                    {{party.borderColor().value()}}

                    <button matButton="outlined" (click)="removeParty($index)">
                        Delete party
                    </button>

                    <!-- TODO drag handle -->
                </mat-card-content></mat-card>
            }
        </div>
    </div>

    <!-- TODO show the validation errors on a tooltip -->
    <button matButton="filled" (click)="generateDiagram()" [disabled]="!diagramForm().valid()">Make my diagram</button>

    @if (diagrams().length) {
        <div id="diagrams">
            @for (diagram of diagrams(); track $index) {
                {{ diagram }}
                <!-- TODO display the diagram here, with button to dl -->
            }
        </div>
    }
</app-standard-page>
