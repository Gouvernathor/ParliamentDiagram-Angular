<app-standard-page>
    <h2>Arch-shaped parliament diagram generator</h2>

    <!-- presentation and explanations -->

    <!-- (later) query party list from a Commons diagram -->

    <!-- (later) query party list from a country in a list -->

    <mat-expansion-panel>
        <mat-expansion-panel-header>
            <mat-panel-title>Advanced parameters</mat-panel-title>
        </mat-expansion-panel-header>

        <label for="seatRadiusFactorInput">Seat radius factor</label>
        <mat-slider [discrete]="true" [min]=".01" [max]="1" [step]=".01">
            <input id="seatRadiusFactorInput" matSliderThumb [formField]="diagramForm.seatRadiusFactor" />
        </mat-slider>

        <!-- number input for seatNumberFontSizeFactor ? -->
        <!-- number input for minNRows -->

        <label for="fillingStrategy">Filling strategy</label>
        <mat-button-toggle-group
            id="fillingStrategy" name="fillingStrategy" aria-label="Filling strategy"
            [value]="diagramForm.fillingStrategy().value()"
            (change)="diagramForm.fillingStrategy().value.set($event.value)"
        >
            <mat-button-toggle
                [value]="FillingStrategy.DEFAULT"
                matTooltip="The seats are distributed proportionally to the maximal number of seats each row can hold. The result is that the lateral distance between the seats is close among all rows."
            >Default</mat-button-toggle>
            <mat-button-toggle
                [value]="FillingStrategy.EMPTY_INNER"
                matTooltip="This selects as few outermost rows as necessary to hold the given seats, then distributes the seats proportionally among them. It results in denser rows."
            >Empty inner rows</mat-button-toggle>
            <mat-button-toggle
                [value]="FillingStrategy.OUTER_PRIORITY"
                matTooltip="This fills the rows to their maximal capacity, starting with the outermost rows going in. The result is that given a number of rows, adding one seat makes a change in only one row."
            >Outer rows priority</mat-button-toggle>
        </mat-button-toggle-group>

        <!-- slider for spanAngle -->
    </mat-expansion-panel>

    <div id="partylistarea">
        <button matButton="tonal" (click)="addParty()">+ Add a party manually</button>

        <div id="partylist">
            @for (party of diagramForm.parties; track $index) {
                <mat-card class="partycard"><mat-card-content>
                    <mat-form-field>
                        <mat-label>Party name</mat-label>
                        <input matInput [formField]="party.name" />
                    </mat-form-field>

                    <mat-form-field>
                        <mat-label>Seats</mat-label>
                        <input matInput type="number" [formField]="party.nSeats" />
                    </mat-form-field>

                    <color-input
                        [attr.value]="party.color().value()"
                        (change)="party.color().value.set($any($event).detail.value)"
                    />

                    <!-- TODO turn into a slider ? -->
                    <mat-form-field>
                        <mat-label>Border width</mat-label>
                        <input matInput type="number" step=".01" [formField]="party.borderWidth" />
                    </mat-form-field>

                    <color-input no-alpha [hidden]="party.borderWidth().value() <= 0"
                        [attr.value]="party.borderColor().value()"
                        (change)="party.borderColor().value.set($any($event).detail.value)"
                    />

                    <button matButton="outlined" (click)="removeParty($index)">
                        Delete party
                    </button>

                    <!-- TODO drag handle -->
                </mat-card-content></mat-card>
            }
        </div>
    </div>

    <!-- TODO show the validation errors on a tooltip -->
    <button matButton="filled" (click)="generateDiagram()" [disabled]="!diagramForm().valid()">Make my diagram</button>

    @if (diagrams().length) {
        <div id="diagrams">
            @for (diagram of diagrams(); track $index) {
                <div class="diagramcard">
                    <div [appContents]="diagram"></div>

                    <button matButton="tonal" (click)="downloadDiagram(diagram)">
                        Download SVG diagram
                    </button>
                </div>
            }
        </div>
    }
</app-standard-page>
