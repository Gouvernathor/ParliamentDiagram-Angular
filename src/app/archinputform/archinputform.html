<div class="block card">
    <div class="card-body">
        <div class="row"><div class="col-12">
            <button type="button" class="btn btn-primary" [class.active]="advancedShown()" [ariaPressed]="advancedShown()" (click)="toggleAdvanced()">
                Advanced parameters
            </button>
        </div></div>

        @if (advancedShown()) {
            <app-advanced-options (options)="rawOptions.set($event)"/>
        }
    </div>
</div>

<div #partylistcard class="block card">
    <div class="card-body">
        @if (partylist().length) {
            <button id="addpartymanualtop" class="mb-2 btn btn-primary" (click)="addPartyManual()">+ Add a party</button>
        }

        <form id="partylistcontainer" class="sortableContainer" cdkDropList (cdkDropListDropped)="drop($event)">
            @for (party of partylist(); track party.nId) {
                <div id="party{{party.nId}}" class="card partycard" cdkDrag [cdkDragData]="party" [cdkDragBoundary]="partylistcard">
                    <div class="card-body container">
                        <div class="row gx-0">
                            <div class="col"><div class="form-floating">
                                <input
                                    type="text" class="form-control" name="partyName{{party.nId}}"
                                    value="{{party.name()}}" [class.is-invalid]="!party.name().trim()"
                                    (change)="party.name.set($event.target.value.trim())"
                                />
                                <label for="partyName{{party.nId}}">Party {{party.nId}} Name</label>
                            </div></div>

                            <div class="col"><div class="form-floating">
                                <input
                                    type="number" class="form-control" name="partySeats{{party.nId}}"
                                    min="0" step="1" value="{{party.nSeats()}}" [class.is-invalid]="party.nSeats() < 0 || !isInt(party.nSeats())"
                                    (change)="party.nSeats.set($event.target.valueAsNumber)"
                                />
                                <label for="partySeats{{party.nId}}">Party {{party.nId}} Seats</label>
                            </div></div>
                        </div>

                        <div class="row gx-0">
                            <div class="col"><div class="form-floating">
                                <!-- TODO make a proper color input -->
                                <!-- <input
                                    type="color" class="form-control form-control-color" name="partyColor{{party.nId}}"
                                    value="{{party.fillColor}}"
                                    (change)="party.fillColor = $event.target.value"
                                /> -->
                                <input
                                    type="text" class="form-control" name="partyColor{{party.nId}}"
                                    value="{{party.fillColor()}}"
                                    (change)="party.fillColor.set($event.target.value)"
                                />
                                <label for="partyColor{{party.nId}}">Party {{party.nId}} Color</label>
                            </div></div>

                            <div class="col"><div class="form-floating">
                                <input
                                    type="range" class="form-control form-range" name="partyBorderWidth{{party.nId}}"
                                    min="0" step=".001" max="1" value="{{party.borderWidth()}}"
                                    (input)="party.borderWidth.set($event.target.valueAsNumber)"
                                />
                                <label for="partyBorderWidth{{party.nId}}">
                                    Party {{party.nId}} Border Width&nbsp;: {{party.borderWidth() | percent}}
                                </label>
                            </div></div>

                            <div class="col"><div class="form-floating">
                                <!-- TODO same -->
                                <input
                                    type="text" class="form-control" name="partyBorderColor{{party.nId}}"
                                    value="{{party.borderColor()}}"
                                    (change)="party.borderColor.set($event.target.value)"
                                />
                                <label for="partyBorderColor{{party.nId}}">Party {{party.nId}} Border Color</label>
                            </div></div>
                        </div>

                        <button class="btn btn-danger" (click)="deleteParty(party.nId)">Delete party {{party.nId}}</button>

                        <span class="handle btn btn-secondary mover" cdkDragHandle>☰</span>
                    </div>
                </div>
            }
        </form>

        <button id="addpartymanual" class="btn btn-primary" (click)="addPartyManual()">+ Add a party</button>
    </div>
</div>

<button id="diagrammaker" class="btn btn-success" (click)="makeDiagram()" [disabled]="totalSeats() < 1">Make my diagram</button>

@if (svgs.length) {
    <div class="block card">
        <div class="card-body" id="svgcontainer">
            @for (svg of svgs; track svgs.length - $index) {
                <p #p id="svgp-{{$count-$index}}" [appFirstChild]="svg">
                    <!-- diagram ends up here -->
                    <br/>
                    <button class="btn btn-success" (click)="downloadSVG(svg)">Download</button>
                    <!-- <hr/> then Legend template for use in Wikipedia&nbsp;: then the template -->
                </p>
            }
        </div>
    </div>
}
