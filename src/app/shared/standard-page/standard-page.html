<mat-toolbar>
    <mat-toolbar-row>
        <img src="header-logo.svg" class="logo" />
        <h1>ParliamentDiagram</h1>

        <!-- TODO spacer then light/dark mode switch -->
    </mat-toolbar-row>
</mat-toolbar>

<nav>
    <a routerLink="/arch">
        <mat-card>
            <img mat-card-image src="sample-arch.svg" />
            <mat-card-content>Arch-style diagram</mat-card-content>
        </mat-card>
    </a>
    <a routerLink="/westminster">
        <mat-card>
            <img mat-card-image src="sample-westminster.svg" />
            <mat-card-content>Westminster-style diagram</mat-card-content>
        </mat-card>
    </a>
</nav>

<!-- transclude -->
<main>
    <ng-content/>
</main>
