<app-standard-page>
    <h2>OAuth landing</h2>

    @let code = this.code();
    @if (code) {
        @if (done()) {
            <p>Done ! You can close this tab.</p>
        } @else {
            <p>Please wait, your authentication is being processed…</p>
        }
    } @else {
        <p>Wrong redirect : no code provided in the URL.</p>
    }
</app-standard-page>
